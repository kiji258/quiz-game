<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>安全知识竞赛 - 最终版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,sans-serif;background:#0b0f17;color:#e2e8f0;padding:16px;}
        .btn{padding:10px 22px;border-radius:40px;font-weight:bold;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:1rem;}
        .btn-primary{background:#f0c040;color:#1e1a0a;}
        .btn-outline{background:transparent;border:2px solid #64748b;color:#cbd5e1;}
        .btn-danger{background:#ef4444;color:white;}
        .btn-success{background:#10b981;color:white;}
        .btn-sm{padding:6px 14px;font-size:0.9rem;}
        .btn-highlight{border-color:#f0c040!important;box-shadow:0 0 20px rgba(240,192,64,0.7)!important;}
        .panel{background:#111827;border-radius:32px;padding:24px;margin-bottom:20px;}
        .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-top:16px;}
        .team-card{background:#1a1f2e;border-radius:20px;padding:12px;text-align:center;border-left:6px solid;}
        .score-big{font-size:2rem;font-weight:900;}
        .question-area{background:#0f172a;border-radius:28px;padding:24px;margin:16px 0;}
        .q-text{font-size:2.8rem;font-weight:700;margin:12px 0;word-break:break-word;}
        .options{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
        .option{background:#1e293b;border-radius:60px;padding:14px 24px;font-size:1.5rem;cursor:pointer;border:2px solid transparent;text-align:left;}
        .option:active{background:#334155;}
        .option.disabled{opacity:0.5;pointer-events:none;}
        .buzz-btn{background:radial-gradient(circle,#fbbf24,#d97706);border:none;border-radius:120px;padding:24px;font-size:2.2rem;font-weight:900;width:100%;margin:20px 0;cursor:pointer;}
        .buzz-btn:disabled{opacity:0.5;pointer-events:none;}
        .timer{font-size:2rem;font-weight:bold;color:#fbbf24;text-align:center;font-family:monospace;background:#00000055;padding:8px 20px;border-radius:60px;display:inline-block;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;border:3px solid #f0c040;padding:14px 30px;border-radius:60px;z-index:2000;font-weight:bold;animation:fadeOut 3.5s forwards;}
        @keyframes fadeOut{0%{opacity:1;}100%{opacity:0;visibility:hidden;}}
        .result-banner{text-align:center;padding:24px;margin:16px 0;border-radius:60px;font-weight:900;font-size:3rem;animation:fadeOutResult 4s forwards;}
        .result-banner.correct{background:#10b981;color:white;border:4px solid #fbbf24;}
        .result-banner.wrong{background:#ef4444;color:white;border:4px solid #fbbf24;}
        .result-banner.buzz{background:#fbbf24;color:#1e1a0a;font-size:2.8rem;}
        .result-banner.end{background:#8b5cf6;color:white;}
        @keyframes fadeOutResult{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;visibility:hidden;}}
        .phase-tip{font-size:1.6rem;font-weight:bold;text-align:center;margin:8px 0;color:#f0c040;}
        input,select,textarea{background:#1e293b;border:2px solid #475569;color:white;padding:10px 16px;border-radius:30px;width:100%;margin-bottom:10px;}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;}
        .modal-card{background:#111827;border-radius:32px;padding:24px;width:90%;max-width:500px;}
        .loading{text-align:center;padding:50px;font-size:1.5rem;color:#f0c040;}
        .hidden{display:none!important;}
        .flex-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
        .draw-anim{animation:drawBlink 0.6s infinite;}
        @keyframes drawBlink{0%{opacity:1;}50%{opacity:0.5;background:#fbbf24;color:#000;}100%{opacity:1;}}
        .member-count{background:#f0c040;color:#000;border-radius:50%;width:20px;height:20px;display:inline-block;font-size:0.7rem;line-height:20px;margin-left:4px;}
        table{width:100%;border-collapse:collapse;margin-top:12px;}
        th,td{border:1px solid #334155;padding:8px;text-align:center;}
        th{background:#1e293b;}
        .tab-btn{background:transparent;border:2px solid #475569;color:#cbd5e1;padding:8px 20px;border-radius:30px;cursor:pointer;}
        .tab-btn.active{background:#f0c040;color:#000;}
    </style>
</head>
<body>
<div id="app"><div class="loading">⏳ 连接服务器中...</div></div>
<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    let role = urlParams.get('role');
    let ws = null;
    let gameState = null;
    let currentPlayer = null;
    let playerLoginRendered = false;
    let rushCountdown = 0, mutualCountdown = 0, countdownInterval = null, answerLocked = false;
    const wsUrl = `${location.protocol==='https:'?'wss:':'ws:'}//${location.host}`;

    function formatTime(sec) { const m=Math.floor(sec/60), s=sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }
    function showToast(msg) { const t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3500); }
    function sendMessage(msg) { if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(msg)); }

    function startCountdownDisplay() {
        if(countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            const rushEl = document.getElementById('rushTimer'), mutualEl = document.getElementById('mutualTimer');
            if(rushEl && gameState.currentActivity==='rush') {
                if(gameState.rush.roundState==='RUSHING'||gameState.rush.roundState==='ANSWERING') rushEl.textContent = `⏰ 倒计时: ${formatTime(rushCountdown)}`;
                else rushEl.textContent = '';
            }
            if(mutualEl && gameState.currentActivity==='mutual' && gameState.mutual.roundActive) mutualEl.textContent = `⌛ 倒计时: ${formatTime(mutualCountdown)}`;
            else if(mutualEl) mutualEl.textContent = '';
            if(gameState.currentActivity==='rush' && (gameState.rush.roundState==='RUSHING'||gameState.rush.roundState==='ANSWERING')) rushCountdown = Math.max(0, rushCountdown-1);
            if(gameState.currentActivity==='mutual' && gameState.mutual.roundActive) mutualCountdown = Math.max(0, mutualCountdown-1);
        }, 1000);
    }

    function connectWebSocket() {
        ws = new WebSocket(wsUrl);
        ws.onopen = () => console.log('WS connected');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.type==='STATE') {
                gameState = data.state;
                answerLocked = false;
                if(data.state.rushRemainingSec !== undefined) { rushCountdown = data.state.rushRemainingSec; mutualCountdown = data.state.mutualRemainingSec||0; }
                renderFullPage(); startCountdownDisplay();
            } else if(data.type==='ANSWER_RESULT') { showToast(data.result.msg); answerLocked = false; }
        };
        ws.onclose = () => setTimeout(connectWebSocket,3000);
    }

    function getMemberCount(teamId) { return (gameState?.teamMembers?.[teamId]||[]).length; }
    function isTeamActive(teamId) { return gameState?.activeTeams?.includes(teamId); }
    function renderTeamCard(p) {
        if(!isTeamActive(p.id)) return '';
        return `<div class="team-card" style="border-left-color:${p.color}"><div>${p.emoji} ${p.name} <span class="member-count">${getMemberCount(p.id)}</span></div><div class="score-big">${p.score}</div></div>`;
    }

    // 登录界面
    function renderLogin() {
        if(document.getElementById('loginPage')) return;
        document.getElementById('app').innerHTML = `
            <div class="panel" id="loginPage" style="max-width:400px;margin:10vh auto;">
                <h1 style="font-size:2rem;text-align:center;">安全知识竞赛</h1>
                <button class="btn btn-outline" id="hostBtn" style="width:100%;margin:12px 0;">🎤 主持人</button>
                <button class="btn btn-outline" id="adminBtn" style="width:100%;margin-bottom:12px;">📊 管理员</button>
                <button class="btn btn-outline" id="playerBtn" style="width:100%;">👥 参赛选手</button>
                <div id="passwordDiv" class="hidden" style="margin-top:16px;">
                    <input type="password" id="password" placeholder="密码">
                    <button class="btn btn-primary" id="submitPwd" style="width:100%;">确认</button>
                </div>
            </div>`;
        let targetRole=null;
        document.getElementById('hostBtn').onclick = () => { targetRole='host'; document.getElementById('passwordDiv').classList.remove('hidden'); };
        document.getElementById('adminBtn').onclick = () => { targetRole='admin'; document.getElementById('passwordDiv').classList.remove('hidden'); };
        document.getElementById('playerBtn').onclick = () => { window.location.href='?role=player'; };
        document.getElementById('submitPwd').onclick = () => {
            const pwd = document.getElementById('password').value;
            if(targetRole==='host' && pwd==='123') window.location.href='?role=host';
            else if(targetRole==='admin' && pwd==='679') window.location.href='?role=admin';
            else alert('密码错误');
        };
    }

    // 选手登录
    function renderPlayerLogin() {
        if(!gameState) { document.getElementById('app').innerHTML = '<div class="panel" style="max-width:400px;margin:10vh auto;"><p>⏳ 连接服务器...</p></div>'; return; }
        if(playerLoginRendered) { updateTeamSelectOptions(); return; }
        document.getElementById('app').innerHTML = `
            <div class="panel" id="playerLoginPage" style="max-width:400px;margin:10vh auto;">
                <h2>选手登录</h2>
                <input id="playerName" placeholder="真实姓名">
                <select id="teamSelect"></select>
                <button class="btn btn-primary" id="joinBtn" style="width:100%;">进入赛场</button>
            </div>`;
        playerLoginRendered = true; updateTeamSelectOptions();
        document.getElementById('joinBtn').onclick = async () => {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return alert('请输入姓名');
            const teamId = parseInt(document.getElementById('teamSelect').value);
            await fetch(`/api/team-members/${teamId}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({playerName:name})});
            currentPlayer = { id:teamId, name:gameState.players.find(p=>p.id===teamId).name, playerName:name };
            renderFullPage(); startCountdownDisplay();
        };
    }
    function updateTeamSelectOptions() { const sel=document.getElementById('teamSelect'); if(sel) sel.innerHTML = gameState.players.map(t => `<option value="${t.id}">${t.emoji} ${t.name}</option>`).join(''); }

    // 主持人界面
    function renderHost() {
        const act = gameState.currentActivity, rush = gameState.rush, mutual = gameState.mutual;
        let bannerHtml = '';
        if(gameState.activityEnded) bannerHtml = `<div class="result-banner end">🎉 本次活动到此结束，感谢大家参与！</div>`;
        else {
            if(gameState.lastBuzzWinner?.timestamp+4000 > Date.now()) bannerHtml += `<div class="result-banner buzz">🏆 ${gameState.lastBuzzWinner.teamName} 抢答成功</div>`;
            if(gameState.lastAnswerResult?.timestamp && gameState.lastAnswerResult.timestamp+4000 > Date.now()) {
                const cls = gameState.lastAnswerResult.isCorrect ? 'correct' : 'wrong';
                bannerHtml += `<div class="result-banner ${cls}">${gameState.lastAnswerResult.message}</div>`;
            }
        }
        let content = `<div class="panel"><div class="flex-row"><h2>🎙️ 主持人</h2><button class="btn btn-outline btn-sm" id="logoutBtn">退出</button></div>
            <div class="flex-row" style="margin:16px 0;">
                <button class="btn ${act==='mutual'?'btn-primary':'btn-outline'}" id="selectMutual">互问互答</button>
                <button class="btn ${act==='rush'?'btn-primary':'btn-outline'}" id="selectRush">抢答活动</button>
            </div>
            <div class="phase-tip">${gameState.activityEnded?'结束':(act==='rush'?'抢答':mutual.phaseEnded?'互问互答(已结束)':'互问互答')}</div>
            ${bannerHtml}`;
        if(!gameState.activityEnded) {
            if(act==='rush') {
                if(rush.questionsExhausted) content += `<div class="question-area"><div>题库已空</div><button class="btn btn-primary" id="endActivityBtn">结束活动</button></div>`;
                else content += `<div class="question-area"><div>状态: ${rush.roundState}</div>
                    ${rush.currentQuestion?`<div class="q-text">${rush.currentQuestion.question}</div><div class="options">${rush.currentQuestion.options.map((o,i)=>`<div class="option">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div>`:'<div>暂无题目</div>'}
                    <div id="rushTimer" class="timer">⏰ ${formatTime(rushCountdown)}</div>
                    <button class="btn btn-primary" id="startRushBtn" ${rush.roundState!=='IDLE'?'disabled':''}>开始抢答</button>
                    <button class="btn btn-outline" id="skipRushBtn">跳过</button></div>`;
            } else {
                const drawTeam = gameState.players.find(p=>p.id===mutual.currentDrawTeamId), answerTeam = gameState.players.find(p=>p.id===mutual.currentAnswerTeamId);
                content += `<div class="question-area"><div>抽题: ${drawTeam?.name} | 答题: ${answerTeam?.name}</div>
                    ${mutual.roundActive?`<div class="q-text">${mutual.currentQuestion?.question}</div><div class="options">${mutual.currentQuestion?.options.map((o,i)=>`<div class="option">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div><div id="mutualTimer" class="timer">⌛ ${formatTime(mutualCountdown)}</div>`:'<div>等待抽题...</div>'}
                    <button class="btn btn-primary" id="drawBtn" ${(mutual.roundActive||mutual.phaseEnded)?'disabled':''}>📖 抽题</button></div>`;
            }
        }
        content += `<div class="team-grid">${gameState.players.map(renderTeamCard).join('')}</div></div>`;
        document.getElementById('app').innerHTML = content;
        if(!gameState.activityEnded) {
            document.getElementById('selectRush').onclick = () => sendMessage({type:'HOST_ACTION',action:'selectActivity',payload:'rush'});
            document.getElementById('selectMutual').onclick = () => sendMessage({type:'HOST_ACTION',action:'selectActivity',payload:'mutual'});
            if(act==='rush') {
                if(!rush.questionsExhausted) {
                    document.getElementById('startRushBtn').onclick = () => sendMessage({type:'HOST_ACTION',action:'startRush'});
                    document.getElementById('skipRushBtn').onclick = () => sendMessage({type:'HOST_ACTION',action:'skipRush'});
                }
            } else document.getElementById('drawBtn').onclick = () => sendMessage({type:'HOST_ACTION',action:'drawQuestion',payload:{drawTeamId:mutual.currentDrawTeamId}});
        }
        document.getElementById('logoutBtn').onclick = () => { window.location.href='/'; };
    }

    // 选手主界面
    function renderPlayerMain() {
        const player = gameState.players.find(p=>p.id===currentPlayer.id);
        if(!player) return;
        if(gameState.activityEnded) { document.getElementById('app').innerHTML = `<div class="panel"><div class="result-banner end">🎉 活动结束，感谢参与！</div></div>`; return; }
        const act = gameState.currentActivity, rush = gameState.rush, mutual = gameState.mutual;
        let canBuzz=false, canAnswer=false, showBuzz=(act==='rush');
        let qHtml='<div>等待主持人开始...</div>', optHtml='', timerHtml='', special='';
        if(act==='rush') {
            if(rush.currentQuestion && rush.roundState!=='IDLE') {
                qHtml = `<div class="q-text">${rush.currentQuestion.question}</div>`;
                optHtml = `<div class="options" id="opts">${rush.currentQuestion.options.map((o,i)=>`<div class="option" data-opt="${i}">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div>`;
                canBuzz = (rush.roundState==='RUSHING' && rush.buzzerPlayerId===null);
                if(rush.roundState==='RUSHING') timerHtml=`<div id="rushTimer" class="timer">⏰ ${formatTime(rushCountdown)}</div>`;
                if(rush.roundState==='ANSWERING' && rush.buzzerPlayerId===player.id) { timerHtml=`<div id="rushTimer" class="timer">✏️ ${formatTime(rushCountdown)}</div>`; canAnswer=true; }
            }
        } else {
            if(mutual.roundActive) {
                const isAnswer = (mutual.answeringPlayerId===player.id);
                qHtml = `<div class="q-text">${mutual.currentQuestion?.question}</div>`;
                optHtml = `<div class="options" id="opts">${mutual.currentQuestion?.options.map((o,i)=>`<div class="option" data-opt="${i}">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div>`;
                if(isAnswer) { timerHtml=`<div id="mutualTimer" class="timer">⌛ ${formatTime(mutualCountdown)}</div>`; canAnswer=true; special='<div style="color:#10b981;">🎤 轮到你们队！</div>'; }
                else special=`<div>⏳ ${gameState.players.find(p=>p.id===mutual.answeringPlayerId)?.name} 正在答题</div>`;
            } else if(mutual.phaseEnded) special='<div>🎉 互问互答环节已结束！</div>';
            else {
                special = `<div>抽题: ${gameState.players.find(p=>p.id===mutual.currentDrawTeamId)?.name} | 答题: ${gameState.players.find(p=>p.id===mutual.currentAnswerTeamId)?.name}</div>`;
                if(mutual.currentDrawTeamId===player.id) special += `<button class="btn btn-primary" id="drawBtn">📖 抽题</button>`;
            }
        }
        let bannerHtml = '';
        if(gameState.lastBuzzWinner?.timestamp+4000 > Date.now()) bannerHtml += `<div class="result-banner buzz">🏆 ${gameState.lastBuzzWinner.teamName} 抢答成功</div>`;
        if(gameState.lastAnswerResult?.timestamp && gameState.lastAnswerResult.timestamp+4000 > Date.now()) {
            const cls = gameState.lastAnswerResult.isCorrect ? 'correct' : 'wrong';
            bannerHtml += `<div class="result-banner ${cls}">${gameState.lastAnswerResult.message}</div>`;
        }
        const html = `<div class="panel"><div class="flex-row"><h2>${player.emoji} ${player.name} (${currentPlayer.playerName})</h2><button class="btn btn-outline btn-sm" id="logoutBtn">退出</button></div>
            <div class="phase-tip">${act==='rush'?'⚡抢答':'🤝互问互答'}</div>
            ${bannerHtml}
            <div class="question-area">${qHtml}${optHtml}${timerHtml}${special}</div>
            ${showBuzz?`<button class="buzz-btn ${canBuzz?'':'disabled'}" id="buzzBtn" ${!canBuzz?'disabled':''}>⚡ 抢答</button>`:''}
            <div class="team-grid">${gameState.players.map(renderTeamCard).join('')}</div></div>`;
        document.getElementById('app').innerHTML = html;
        if(showBuzz && canBuzz) document.getElementById('buzzBtn').onclick = () => sendMessage({type:'PLAYER_RUSH',playerId:player.id,playerName:currentPlayer.playerName});
        const optsDiv = document.getElementById('opts');
        if(optsDiv && canAnswer && !answerLocked) {
            optsDiv.querySelectorAll('.option').forEach(opt => {
                opt.onclick = function() {
                    if(answerLocked) return;
                    answerLocked = true;
                    optsDiv.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
                    sendMessage({type:'PLAYER_ANSWER', playerId:player.id, playerName:currentPlayer.playerName, answerIndex:parseInt(this.dataset.opt)});
                };
            });
        }
        const drawBtn = document.getElementById('drawBtn');
        if(drawBtn) drawBtn.onclick = () => sendMessage({type:'HOST_ACTION',action:'drawQuestion',payload:{drawTeamId:player.id}});
        document.getElementById('logoutBtn').onclick = () => { currentPlayer=null; playerLoginRendered=false; window.location.href='?role=player'; };
    }

    // 管理员界面（包含 Excel 批量导入）
    let adminTab = 'scores';
    async function renderAdmin() {
        document.getElementById('app').innerHTML = `<div class="panel"><h2>📊 管理员</h2>
            <div class="flex-row">
                <button class="tab-btn ${adminTab==='scores'?'active':''}" id="tabScores">分数</button>
                <button class="tab-btn ${adminTab==='rushQuestions'?'active':''}" id="tabRush">抢答题库</button>
                <button class="tab-btn ${adminTab==='mutualQuestions'?'active':''}" id="tabMutual">互问题库</button>
                <button class="tab-btn ${adminTab==='history'?'active':''}" id="tabHistory">记录</button>
                <button class="tab-btn ${adminTab==='members'?'active':''}" id="tabMembers">成员</button>
            </div>
            <div id="adminContent"></div>
            <button class="btn btn-outline" id="adminLogout">退出</button></div>`;
        document.getElementById('adminLogout').onclick = () => window.location.href='/';
        document.getElementById('tabScores').onclick = () => { adminTab='scores'; renderAdminContent(); };
        document.getElementById('tabRush').onclick = () => { adminTab='rushQuestions'; renderAdminContent(); };
        document.getElementById('tabMutual').onclick = () => { adminTab='mutualQuestions'; renderAdminContent(); };
        document.getElementById('tabHistory').onclick = () => { adminTab='history'; renderAdminContent(); };
        document.getElementById('tabMembers').onclick = () => { adminTab='members'; renderAdminContent(); };
        renderAdminContent();
    }
    async function renderAdminContent() {
        const div = document.getElementById('adminContent');
        if(!div) return;
        if(adminTab==='scores') {
            const scores = await fetch('/api/scores').then(r=>r.json());
            div.innerHTML = `<h3>分数总览</h3><table><tr><th>队伍</th><th>总分</th><th>队员</th></tr>${scores.map(s=>`<tr><td>${s.emoji} ${s.name}</td><td>${s.score}</td><td>${s.members.join('、')||'无'}</td></tr>`).join('')}</table><button class="btn btn-primary btn-sm" id="exportExcel">导出Excel</button>`;
            document.getElementById('exportExcel').onclick = () => {
                const ws = XLSX.utils.aoa_to_sheet([['队伍','总分','队员'], ...scores.map(s => [s.name, s.score, s.members.join('、')])]);
                XLSX.writeFile({Sheets:{Sheet1:ws},SheetNames:['Sheet1']}, "分数.xlsx");
            };
        } else if(adminTab==='rushQuestions'||adminTab==='mutualQuestions') {
            const type = adminTab==='rushQuestions'?'rush':'mutual';
            const questions = await fetch(`/api/${type}-questions`).then(r=>r.json());
            div.innerHTML = `<h3>${type==='rush'?'抢答':'互问'}题库 (${questions.length}题)</h3>
                <div class="flex-row" style="margin-bottom:12px;">
                    <button class="btn btn-sm btn-primary" id="addQ">+ 新增</button>
                    <button class="btn btn-sm btn-outline" id="importJSON">📥 导入JSON</button>
                    <button class="btn btn-sm btn-outline" id="importExcel">📥 导入Excel</button>
                    <button class="btn btn-sm btn-outline" id="exportJSON">📤 导出JSON</button>
                </div>
                <table>${questions.length===0?'<tr><td>暂无题目</td></tr>':`<tr><th>题目</th><th>类型</th><th>选项</th><th>答案</th><th>操作</th></tr>${questions.map(q=>`<tr><td>${q.question}</td><td>${q.type}</td><td>${q.options.join(' | ')}</td><td>${q.type==='判断题'?(q.answer===0?'正确':'错误'):q.options[q.answer]}</td><td><button class="editQ" data-id="${q.id}">✏️</button><button class="delQ" data-id="${q.id}">🗑</button></td></tr>`).join('')}`}</table>`;
            document.getElementById('addQ').onclick = () => showQuestionModal(type);
            document.getElementById('importJSON').onclick = () => {
                const input = document.createElement('input'); input.type='file'; input.accept='.json';
                input.onchange = async (e) => {
                    const file = e.target.files[0]; if(!file) return;
                    const text = await file.text(); const arr = JSON.parse(text);
                    for(const q of arr) await fetch(`/api/${type}-questions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(q)});
                    renderAdminContent();
                };
                input.click();
            };
            document.getElementById('importExcel').onclick = () => {
                const input = document.createElement('input'); input.type='file'; input.accept='.xlsx,.xls';
                input.onchange = async (e) => {
                    const file = e.target.files[0]; if(!file) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const data = new Uint8Array(ev.target.result);
                        const workbook = XLSX.read(data, {type:'array'});
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(firstSheet, {header:1});
                        // 期望格式：题目,类型,选项1|选项2|选项3,答案索引(数字)
                        for(let i=1; i<rows.length; i++) {
                            const row = rows[i];
                            if(!row || row.length < 3) continue;
                            const question = row[0];
                            const type = row[1] || '选择题';
                            let options = [];
                            if(row[2]) options = String(row[2]).split('|').map(s=>s.trim());
                            if(type==='判断题') options = ['正确','错误'];
                            const answer = parseInt(row[3]) || 0;
                            await fetch(`/api/${type}-questions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question, type, options, answer})});
                        }
                        renderAdminContent();
                    };
                    reader.readAsArrayBuffer(file);
                };
                input.click();
            };
            document.getElementById('exportJSON').onclick = async () => {
                const data = await fetch(`/api/${type}-questions`).then(r=>r.json());
                const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
                const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${type}_questions.json`; a.click();
            };
            document.querySelectorAll('.editQ').forEach(b => b.onclick = async () => {
                const q = await fetch(`/api/${type}-questions`).then(r=>r.json()).then(list=>list.find(x=>x.id===b.dataset.id));
                showQuestionModal(type, q);
            });
            document.querySelectorAll('.delQ').forEach(b => b.onclick = async () => {
                if(confirm('删除？')) await fetch(`/api/${type}-questions/${b.dataset.id}`,{method:'DELETE'});
                renderAdminContent();
            });
        } else if(adminTab==='history') {
            const history = await fetch('/api/history').then(r=>r.json());
            div.innerHTML = `<h3>答题记录</h3><table><tr><th>时间</th><th>活动</th><th>队伍</th><th>选手</th><th>题目</th><th>答案</th><th>结果</th><th>分数</th></tr>${history.map(h=>`<tr><td>${new Date(h.timestamp).toLocaleTimeString()}</td><td>${h.activityType}</td><td>${h.teamName}</td><td>${h.playerName}</td><td>${h.question}</td><td>${h.selectedAnswer}</td><td>${h.isCorrect?'✅':'❌'}</td><td>${h.scoreDelta}</td></tr>`).join('')}</table>`;
        } else if(adminTab==='members') {
            const members = await fetch('/api/team-members').then(r=>r.json());
            div.innerHTML = `<h3>队伍成员</h3>${gameState.players.map(p => {
                const list = members[p.id]||[];
                return `<div><b>${p.emoji} ${p.name} (${list.length}人)</b> <input id="addMem${p.id}" placeholder="姓名"><button class="addMem" data-team="${p.id}">添加</button> <div>${list.map(m=>`<span class="delMem" data-team="${p.id}" data-name="${m}" style="cursor:pointer;">${m} ❌</span>`).join('')}</div></div>`;
            }).join('')}`;
            document.querySelectorAll('.addMem').forEach(b => b.onclick = async () => {
                const teamId = parseInt(b.dataset.team);
                const name = document.getElementById(`addMem${teamId}`).value.trim();
                if(name) await fetch(`/api/team-members/${teamId}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({playerName:name})});
                renderAdminContent();
            });
            document.querySelectorAll('.delMem').forEach(el => el.onclick = async () => {
                await fetch(`/api/team-members/${el.dataset.team}`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({playerName:el.dataset.name})});
                renderAdminContent();
            });
        }
    }

    function showQuestionModal(type, q=null) {
        const modal = document.createElement('div'); modal.className='modal';
        modal.innerHTML = `<div class="modal-card"><h3>${q?'编辑':'新增'}题目</h3>
            <select id="qType"><option value="选择题" ${q?.type==='选择题'?'selected':''}>选择题</option><option value="判断题" ${q?.type==='判断题'?'selected':''}>判断题</option></select>
            <textarea id="qQuestion">${q?.question||''}</textarea>
            <div id="optsDiv">${q?.type==='判断题'?'':(q?.options||['','','','']).map((o,i)=>`<input class="qOpt" value="${o}">`).join('')}</div>
            <select id="qAnswer"></select>
            <button class="btn btn-primary" id="saveQ">保存</button><button class="btn btn-outline" id="cancelQ">取消</button></div>`;
        document.body.appendChild(modal);
        const updateAns = () => {
            const sel = document.getElementById('qAnswer');
            if(document.getElementById('qType').value==='判断题') sel.innerHTML = '<option value="0">正确</option><option value="1">错误</option>';
            else sel.innerHTML = [...document.querySelectorAll('.qOpt')].map(o=>o.value).filter(v=>v).map((o,i)=>`<option value="${i}">${o}</option>`).join('');
        };
        document.getElementById('qType').onchange = function() { document.getElementById('optsDiv').innerHTML = this.value==='判断题'?'':['A','B','C','D'].map(l=>`<input class="qOpt" placeholder="${l}">`).join(''); updateAns(); };
        updateAns();
        if(q) setTimeout(() => { if(q.type==='判断题') document.getElementById('qAnswer').value = q.answer; else { const opts = document.querySelectorAll('.qOpt'); q.options.forEach((o,i)=>{ if(opts[i]) opts[i].value = o; }); document.getElementById('qAnswer').value = q.answer; } },0);
        document.getElementById('saveQ').onclick = async () => {
            const type = document.getElementById('qType').value, question = document.getElementById('qQuestion').value.trim();
            let options, answer;
            if(type==='判断题') { options=['正确','错误']; answer=parseInt(document.getElementById('qAnswer').value); }
            else { options = [...document.querySelectorAll('.qOpt')].map(o=>o.value.trim()).filter(v=>v); answer=parseInt(document.getElementById('qAnswer').value); }
            const payload = {type, question, options, answer};
            if(q) await fetch(`/api/${type}-questions/${q.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
            else await fetch(`/api/${type}-questions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
            document.body.removeChild(modal); renderAdminContent();
        };
        document.getElementById('cancelQ').onclick = () => document.body.removeChild(modal);
    }

    function renderFullPage() {
        if(!gameState) return;
        if(role==='host') renderHost();
        else if(role==='player') { if(!currentPlayer) renderPlayerLogin(); else renderPlayerMain(); }
        else if(role==='admin') renderAdmin();
        else renderLogin();
    }

    connectWebSocket();
})();
</script>
</body>
</html>
